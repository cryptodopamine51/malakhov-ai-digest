name: Telegram Weekly Report Backup

on:
  schedule:
    # 08:20 UTC = 11:20 Moscow, after primary Supabase pg_cron at 11:00.
    - cron: '20 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: telegram-weekly-report-delivery
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout production code
        uses: actions/checkout@v4
        with:
          ref: codex/prod-release-2026-06-17

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run weekly report backup
        run: npx tsx scripts/run-tg-weekly-report-backup.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          TELEGRAM_WEEKLY_REPORT_FORMAT: signal
          NEXT_PUBLIC_SITE_URL: https://news.malakhovai.ru
          NEXT_PUBLIC_TELEGRAM_CHANNEL_URL: https://t.me/malakhovAIdigest
