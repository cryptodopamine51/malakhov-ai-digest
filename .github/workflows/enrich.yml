name: Enrich Articles

on:
  schedule:
    # Каждые 30 минут — DeepSeek-only editorial routing.
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: enrich-articles
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Scheduled workflow definition lives on main; runtime is pinned to the
          # tested production cutover branch until repository histories converge.
          ref: codex/deepseek-only-runtime

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Recover stuck articles
        run: npm run recover-stuck
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Run DeepSeek-only editorial routing
        run: npm run editorial:routing -- --mode=deepseek-only --limit=15 --apply --deepseek-daily-budget=1
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: https://api.deepseek.com
          DEEPSEEK_WRITER_MODEL: deepseek-v4-flash
          # R2 — для зеркалирования внешних cover'ов при apply (pipeline/cover-mirror.ts).
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
