name: Enrich Articles

on:
  schedule:
    # Каждые 30 минут — fallback-first routing: DeepSeek cheap для low-risk,
    # Anthropic Batch fallback для risk/fail cases.
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: enrich-articles
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # main устарела относительно codex/evergreen-quality-standard-2026-05-21,
          # на котором живёт production-код. См. spec_2026-05-22_digest_editorial_priority.md.
          ref: codex/evergreen-quality-standard-2026-05-21

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Recover stuck articles
        run: npm run recover-stuck
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Cost guard pre-check
        run: npm run cost:guard
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          CLAUDE_DAILY_BUDGET_USD: '2'

      - name: Run fallback-first editorial routing
        run: npm run editorial:routing -- --mode=cheap --limit=15 --apply --deepseek-daily-budget=0.25
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: https://api.deepseek.com
          DEEPSEEK_WRITER_MODEL: deepseek-v4-flash
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          CLAUDE_DAILY_BUDGET_USD: '2'
