name: CI

on:
  pull_request:
  push:
    branches:
      - main
      # Production-код деплоится прямым пушем в эту codex-ветку (см. ref-pin в cron-workflow'ах),
      # поэтому гейт обязан запускаться и на ней, а не только на main/PR.
      - codex/evergreen-quality-standard-2026-05-21

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    # Secret-free gate: typecheck + lint + node test suite.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Test (tests/node)
        run: npm test

  build:
    # next build prerenders ISR pages (e.g. sources/[source] generateStaticParams
    # hits Supabase), so this job needs public Supabase read access.
    # Required GitHub secrets: SUPABASE_URL, SUPABASE_ANON_KEY. Если SUPABASE_ANON_KEY
    # не задан — job не падает, а self-skip'ается с warning (включится сам после добавления секрета).
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "::warning::SUPABASE_ANON_KEY secret не задан — build job пропущен. Добавьте секрет в Settings → Secrets and variables → Actions, чтобы включить build-гейт."
            exit 0
          fi
          npm run build
