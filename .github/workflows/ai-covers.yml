name: Generate AI Covers

on:
  schedule:
    # Every 2 hours, with script-level daily budget cap.
    - cron: '10 */2 * * *'
  workflow_dispatch:

concurrency:
  group: ai-covers
  cancel-in-progress: false

jobs:
  covers:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # main устарела относительно codex/evergreen-quality-standard-2026-05-21,
          # на котором живёт production-код (включая обновлённый scripts/generate-ai-covers.ts
          # с фиксом needsAiCover из spec_2026-05-22_digest_editorial_priority.md Wave 2).
          # Без этого pin cron продолжает перетирать продуктовые фото AI-обложкой.
          ref: codex/evergreen-quality-standard-2026-05-21

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate missing AI covers
        run: npm run covers:ai-low -- --category=all --latest-day --days=2 --limit=12 --apply --daily-budget=1
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_IMAGE_DAILY_BUDGET_USD: '1'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}

      - name: Generate template covers for older gaps
        run: npm run covers:template -- --older-than-days=2 --days=30 --limit=30 --apply
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
