name: Weekly Digest Pipeline

on:
  schedule:
    - cron: "15 6 * * 1"
  workflow_dispatch:

jobs:
  weekly-pipeline:
    runs-on: ubuntu-latest
    env:
      BASE_URL: https://news.malakhovai.ru
      TZ: Europe/Moscow
    steps:
      - name: Wake API
        run: |
          for _ in $(seq 1 12); do
            if curl --fail --silent --show-error "$BASE_URL/health" >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          echo "API did not wake in time" >&2
          exit 1

      - name: Run ingestion
        run: |
          for _ in $(seq 1 12); do
            BODY_FILE="$(mktemp)"
            STATUS_CODE="$(curl --silent --show-error -o "$BODY_FILE" -w '%{http_code}' -X POST "$BASE_URL/internal/jobs/ingest")"
            BODY="$(cat "$BODY_FILE")"
            rm -f "$BODY_FILE"
            if [ "$STATUS_CODE" = "200" ]; then
              echo "$BODY"
              exit 0
            fi
            if [ "$STATUS_CODE" = "409" ]; then
              echo "ingest is locked, waiting for retry"
              sleep 15
              continue
            fi
            echo "$BODY"
            echo "ingest failed with status $STATUS_CODE" >&2
            exit 1
          done
          echo "ingest stayed locked for too long" >&2
          exit 1

      - name: Process events until queue drains
        run: |
          DRAINED=false
          for _ in $(seq 1 20); do
            RESPONSE="$(curl --fail --silent --show-error -X POST "$BASE_URL/internal/jobs/process-events")"
            echo "$RESPONSE"
            RAW_ITEMS_CONSIDERED="$(python3 -c 'import json,sys; print(json.loads(sys.argv[1]).get("raw_items_considered", 0))' "$RESPONSE")"
            if [ "$RAW_ITEMS_CONSIDERED" = "0" ]; then
              DRAINED=true
              break
            fi
          done
          if [ "$DRAINED" != "true" ]; then
            echo "process-events did not fully drain within 20 attempts; continuing with partial freshness"
          fi

      - name: Build and send weekly digest
        run: |
          TARGET_DATE="$(python3 - <<'PY'
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo
          today_moscow = datetime.now(ZoneInfo("Europe/Moscow")).date()
          current_week_monday = today_moscow - timedelta(days=today_moscow.weekday())
          previous_week_sunday = current_week_monday - timedelta(days=1)
          print(previous_week_sunday.isoformat())
          PY
          )"
          echo "Building and sending weekly issue for week ending $TARGET_DATE"
          curl --fail --silent --show-error -X POST "$BASE_URL/internal/jobs/build-weekly?date=$TARGET_DATE"
          curl --fail --silent --show-error -X POST "$BASE_URL/internal/jobs/send-weekly?date=$TARGET_DATE"
