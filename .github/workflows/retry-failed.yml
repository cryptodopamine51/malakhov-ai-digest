name: Retry Failed Articles

on:
  schedule:
    # Every 4 hours — pick up retry_wait articles whose timer has expired
    - cron: '30 */4 * * *'
  workflow_dispatch:

jobs:
  retry:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # main устарела относительно codex/evergreen-quality-standard-2026-05-21,
          # на котором живёт production-код. См. spec_2026-05-22_digest_editorial_priority.md.
          ref: codex/evergreen-quality-standard-2026-05-21

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Recover stuck articles
        run: npm run recover-stuck
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Reset retry_wait articles to pending
        run: npm run retry-failed
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Enrich newly unlocked articles
        run: npm run enrich
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_DAILY_BUDGET_USD: '2'
