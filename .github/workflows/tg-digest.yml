name: Telegram Daily Digest

on:
  schedule:
    - cron: '0 6 * * *'   # 09:00 МСК (UTC+3)
  workflow_dispatch:
    inputs:
      force:
        description: 'Force send (bypass duplicate guard and date filter)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

concurrency:
  group: tg-digest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Send Telegram Digest
        run: npm run tg-digest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          FORCE_DIGEST: ${{ github.event.inputs.force == 'true' && '1' || '' }}
