name: Telegram Daily Digest

on:
  schedule:
    # GitHub Actions cron не имеет SLA: задержка 1–2 часа в часы пик — типична.
    # Запускаем 4 раза с интервалом 1 час: первый успевший в день claim-ит slot
    # через digest_runs (UNIQUE на digest_date+channel_id), остальные мгновенно
    # exit-ят с already_claimed. Это компенсирует задержки GH без сторонних
    # сервисов и без риска дублирования сообщений в канале.
    - cron: '0 6 * * *'    # 09:00 МСК — основное окно
    - cron: '0 7 * * *'    # 10:00 МСК — backup-1
    - cron: '0 8 * * *'    # 11:00 МСК — backup-2
    - cron: '0 9 * * *'    # 12:00 МСК — last resort
  workflow_dispatch:
    inputs:
      force:
        description: 'Force send (bypass duplicate guard and date filter)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

concurrency:
  group: tg-digest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compute Moscow date
        id: mskdate
        run: echo "date=$(TZ=Europe/Moscow date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Send Telegram Digest
        run: npm run tg-digest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          FORCE_DIGEST: ${{ github.event.inputs.force == 'true' && '1' || '' }}
          FORCE_DIGEST_CONFIRM_DATE: ${{ github.event.inputs.force == 'true' && steps.mskdate.outputs.date || '' }}
