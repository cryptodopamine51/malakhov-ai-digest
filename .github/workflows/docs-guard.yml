name: Documentation Guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docs-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check docs impact on pull request
        if: github.event_name == 'pull_request'
        run: npm run docs:check -- --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.event.pull_request.head.sha }}"

      - name: Check docs impact on push
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: npm run docs:check -- --base "${{ github.event.before }}" --head "${{ github.sha }}"
