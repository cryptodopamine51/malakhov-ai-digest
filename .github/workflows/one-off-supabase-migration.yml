name: One-off Supabase migration

on:
  push:
    branches:
      - codex/evergreen-quality-standard-2026-05-21
    paths:
      - .github/workflows/one-off-supabase-migration.yml
      - supabase/migrations/017_telegram_channel_posts.sql

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.TEMP_MIGRATION_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Install psql
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Apply Telegram channel posts migration
        run: |
          test -n "$DATABASE_URL"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f supabase/migrations/017_telegram_channel_posts.sql

      - name: Verify Telegram cron state
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -Atc "select to_regclass('public.telegram_channel_posts')"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "select jobname, schedule, active from cron.job where jobname like 'tg-%' order by jobname"
