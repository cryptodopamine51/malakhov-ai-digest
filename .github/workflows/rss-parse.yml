name: RSS Parse

on:
  # Запуск каждые 30 минут
  schedule:
    - cron: '*/30 * * * *'
  # Ручной запуск через GitHub Actions UI
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # main устарела относительно codex/evergreen-quality-standard-2026-05-21,
          # на котором живёт production-код. См. spec_2026-05-22_digest_editorial_priority.md.
          ref: codex/evergreen-quality-standard-2026-05-21

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run RSS ingest
        run: npm run ingest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
