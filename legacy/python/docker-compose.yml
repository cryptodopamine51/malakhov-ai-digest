services:
  postgres:
    image: postgres:16-alpine
    container_name: malakhov_ai_digest_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: malakhov_ai_digest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d malakhov_ai_digest"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
